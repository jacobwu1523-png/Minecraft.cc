<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Minecraft 2D - 終極修復版</title>
    <style>
        :root { --ui-font: clamp(12px, 3.2vw, 18px); --btn-s: clamp(65px, 18vw, 90px); }
        body { margin: 0; overflow: hidden; background: #1b301b; font-family: -apple-system, sans-serif; touch-action: none; width: 100vw; height: 100vh; user-select: none; -webkit-user-select: none; }
        #ui-bar { position: absolute; top: env(safe-area-inset-top, 10px); left: 50%; transform: translateX(-50%); z-index: 5000; display: flex; gap: 2vw; background: rgba(0,0,0,0.8); padding: 10px 18px; border-radius: 30px; border: 1px solid #777; width: fit-content; max-width: 95vw; }
        .stat { color: white; font-size: var(--ui-font); font-weight: bold; display: flex; align-items: center; gap: 4px; }
        #game { position: relative; width: 100%; height: 100%; overflow: hidden; }
        #player { position: absolute; width: 48px; height: 48px; background: #3498db; border: 3px solid white; border-radius: 50%; z-index: 1000; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: top 0.1s, left 0.1s; }
        #hand { position: absolute; right: -12px; bottom: -8px; font-size: 22px; background: #fff; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: 2px solid #333; }
        #joy { position: absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 6vh); left: 7vw; width: 130px; height: 130px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; z-index: 4000; }
        #knob { position: absolute; width: 50px; height: 50px; background: #fff; border-radius: 50%; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #btns { position: absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 6vh); right: 5vw; display: flex; flex-direction: column; gap: 15px; z-index: 4500; }
        .c-btn { width: var(--btn-s); height: var(--btn-s); background: #f1c40f; border: 3px solid #fff; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; }
        .pop { position: absolute; inset: 12% 7%; background: rgba(20,20,20,0.98); border: 4px solid #f1c40f; display: none; z-index: 6000; border-radius: 25px; padding: 20px; color: white; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .card { background: #222; padding: 15px; border-radius: 18px; text-align: center; border: 1px solid #444; }
        .craft-btn { width: 100%; margin-top: 10px; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 12px; font-weight: bold; }
        .obj { position: absolute; width: 50px; height: 50px; font-size: 40px; text-align: center; line-height: 50px; z-index: 500; }
        .river-tile { background: rgba(52, 152, 219, 0.6); z-index: 5; border-radius: 8px; }
        #m-bar { position: absolute; width: 60px; height: 10px; background: #000; display: none; z-index: 3000; border: 1.5px solid #fff; border-radius: 5px; }
        #m-fill { height: 100%; background: #f1c40f; width: 0%; }
        #msg { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #f1c40f; padding: 12px 25px; border-radius: 25px; z-index: 9999; display: none; font-weight: bold; }
    </style>
</head>
<body>
<div id="msg"></div>
<div id="game">
    <div id="river-layer" style="position:absolute; inset:0;"></div>
    <div id="entity-layer" style="position:absolute; inset:0;"></div>
    <div id="ui-bar">
        <div class="stat">❤️<span id="hp">20</span></div>
        <div class="stat">🍖<span id="hg">20</span></div>
        <div class="stat">🪵<span id="r-w">0</span></div>
        <div class="stat">🪨<span id="r-s">0</span></div>
        <div class="stat">🏔️<span id="r-i">0</span></div>
        <div class="stat">💎<span id="r-d">0</span></div>
    </div>
    <div id="m-bar"><div id="m-fill"></div></div>
    <div id="player">🧑‍🦲<div id="hand" style="display:none"></div></div>
    <div id="joy"><div id="knob"></div></div>
    <div id="btns"><div class="c-btn" onclick="openUI('bag')">🎒</div><div class="c-btn" onclick="openUI('craft')">⚒️</div></div>
    <div id="bag-pop" class="pop"><h2 style="text-align:center">🎒 背包</h2><div id="bag-list" class="grid"></div><button onclick="closeUI()" style="width:100%; margin-top:20px; padding:18px; background:#e74c3c; border:none; color:white; border-radius:15px; font-weight:bold;">關閉</button></div>
    <div id="craft-pop" class="pop"><div id="craft-list" class="grid"></div><button onclick="closeUI()" style="width:100%; margin-top:20px; padding:18px; background:#e74c3c; border:none; color:white; border-radius:15px; font-weight:bold;">返回</button></div>
</div>
<script>
    const SAVE_KEY = "MC2D_V3_SAVE";
    var inv, bag, worldData, pX, pY, mX=0, mY=0, mining=false, currentEquip=null, mapMode='forest';

    function save() { localStorage.setItem(SAVE_KEY, JSON.stringify({inv, bag, worldData, currentEquip})); }
    function load() {
        const d = JSON.parse(localStorage.getItem(SAVE_KEY));
        if(d) {
            inv=d.inv; bag=d.bag; worldData=d.worldData; currentEquip=d.currentEquip;
            if(currentEquip) { let h=document.getElementById('hand'); h.innerText=currentEquip.emo; h.style.display='flex'; }
        } else { resetData(); }
        pX=window.innerWidth/2; pY=window.innerHeight/2;
    }

    function resetData() {
        inv={w:0,s:0,i:0,d:0,hp:20,hg:20,wool:0}; bag=[]; 
        worldData={forest:{items:[],rivers:[]},house:{items:[]},cave:{items:[]}};
        let rx = window.innerWidth * 0.45;
        for(let y=0; y<window.innerHeight; y+=45) { rx += Math.sin(y/100)*35; worldData.forest.rivers.push({x:rx, y:y}); }
        for(let i=0; i<8; i++) spawnData('forest','tree','🌲');
        for(let i=0; i<5; i++) spawnData('forest','rock','🪨');
        spawnData('forest','cave_entrance','🕳️', window.innerWidth-80, window.innerHeight/2);
    }

    function spawnData(map, t, icon, x, y) {
        worldData[map].items.push({t:t, icon:icon, x:x||Math.random()*(window.innerWidth-60), y:y||Math.random()*(window.innerHeight-120), live:true});
    }

    function switchMap(mode) {
        mapMode = mode;
        document.getElementById('river-layer').innerHTML = '';
        document.getElementById('entity-layer').innerHTML = '';
        if(mode === 'forest') {
            document.getElementById('game').style.background="#2d4a22";
            worldData.forest.rivers.forEach(r => { let d=document.createElement('div'); d.className='obj river-tile'; d.style.left=r.x+'px'; d.style.top=r.y+'px'; document.getElementById('river-layer').appendChild(d); });
        } else if(mode === 'cave') {
            document.getElementById('game').style.background="#1a1a1a";
            // 強制確保山洞有出口
            let hasLadder = worldData.cave.items.some(it => it.t === 'ladder');
            if(!hasLadder) worldData.cave.items.push({t:'ladder', icon:'🪜', x:window.innerWidth/2, y:60, live:true});
            // 強制確保山洞有礦石
            if(worldData.cave.items.length < 5) { for(let i=0; i<10; i++) spawnData('cave','rock','🪨'); }
        } else { document.getElementById('game').style.background="#5d4037"; }
        
        worldData[mode].items.forEach(it => { if(it.live) render(it); });
        // 森林地圖額外生成動物
        if(mode==='forest') { for(let i=0; i<3; i++) spawnAnimal(); }
    }

    function render(it) {
        let d=document.createElement('div'); d.className='obj'; d.innerHTML=it.icon;
        d.style.left=it.x+'px'; d.style.top=it.y+'px'; document.getElementById('entity-layer').appendChild(d); it.el=d;
    }

    function spawnAnimal() {
        let x=Math.random()*window.innerWidth, y=Math.random()*window.innerHeight;
        let d=document.createElement('div'); d.className='obj'; d.innerHTML='🐮';
        d.style.left=x+'px'; d.style.top=y+'px'; document.getElementById('entity-layer').appendChild(d);
        let ani = {el:d, x, y, t:'animal', live:true};
        let move = setInterval(()=>{
            if(!ani.live || mapMode!=='forest') { clearInterval(move); d.remove(); return; }
            ani.x+=(Math.random()-0.5)*40; ani.y+=(Math.random()-0.5)*40;
            d.style.left=ani.x+'px'; d.style.top=ani.y+'px';
        }, 2000);
        // 碰撞檢測動物
        let check = setInterval(()=>{
            if(!ani.live) { clearInterval(check); return; }
            if(Math.abs(pX-ani.x)<40 && Math.abs(pY-ani.y)<40) {
                ani.live=false; d.remove(); inv.hg=Math.min(20, inv.hg+5); upUI(); notify("🥩 獲得牛肉");
            }
        }, 100);
    }

    function gameLoop() {
        if(!mining) {
            pX+=mX; pY+=mY; pX=Math.max(20, Math.min(window.innerWidth-20, pX)); pY=Math.max(20, Math.min(window.innerHeight-20, pY));
            document.getElementById('player').style.left=pX+'px'; document.getElementById('player').style.top=pY+'px';
            worldData[mapMode].items.forEach(it => {
                if(!it.live) return;
                if(Math.abs(pX-it.x)<45 && Math.abs(pY-it.y)<45) {
                    if(it.t==='cave_entrance') { switchMap('cave'); pX=window.innerWidth/2; pY=window.innerHeight/2; notify("🌋 進入洞穴"); }
                    else if(it.t==='ladder') { switchMap('forest'); pX=window.innerWidth/2; pY=window.innerHeight/2; notify("🌲 回到地面"); }
                    else if(mapMode!=='house') { startMine(it); }
                }
            });
        }
        requestAnimationFrame(gameLoop);
    }

    function startMine(it) {
        mining=true; mX=0; mY=0;
        let bar=document.getElementById('m-bar'), fill=document.getElementById('m-fill');
        bar.style.display='block'; bar.style.left=(pX-30)+'px'; bar.style.top=(pY-55)+'px';
        let pct=0, spd=(currentEquip && currentEquip.id==='dpick')?40:15;
        let t=setInterval(()=>{
            pct+=spd; fill.style.width=pct+'%';
            if(pct>=100){
                clearInterval(t); mining=false; bar.style.display='none'; it.live=false; it.el.style.display='none';
                if(it.t==='tree') inv.w+=3; else { inv.s+=2; if(Math.random()<0.2) inv.i++; }
                save(); upUI(); notify("📦 獲得資源");
                setTimeout(()=>{ it.live=true; if(it.el && mapMode!=='house') it.el.style.display='block'; }, 6000);
            }
        }, 150);
    }

    function openUI(t) { 
        closeUI(); document.getElementById(t+'-pop').style.display='block'; 
        if(t==='bag') drawBag(); 
        else {
            let list=document.getElementById('craft-list'); list.innerHTML='';
            [{id:'axe',n:'木斧',e:'🪓',c:{w:3}},{id:'dpick',n:'鑽石鎬',e:'⛏️',c:{w:2,d:3}}].forEach(r => {
                let card=document.createElement('div'); card.className='card';
                card.innerHTML=`${r.e}<br>${r.n}<br><button class="craft-btn" onclick="craft('${r.id}','${r.e}',${JSON.stringify(r.c)})">製作</button>`;
                list.appendChild(card);
            });
        }
    }
    function craft(id,e,c) {
        let can=true; for(let k in c){ if((inv[k]||0)<c[k]) can=false; }
        if(can){ for(let k in c) inv[k]-=c[k]; bag.push({id,emo:e}); save(); upUI(); notify("✅ 成功"); } else alert("不足");
    }
    function drawBag() {
        let list=document.getElementById('bag-list'); list.innerHTML=bag.length===0?"空":"";
        bag.forEach((it,i)=>{
            let card=document.createElement('div'); card.className='card';
            card.innerHTML=`${it.emo}<br><button class="craft-btn" onclick="equip(${i})">裝備</button>`;
            list.appendChild(card);
        });
    }
    function equip(i) { currentEquip=bag[i]; let h=document.getElementById('hand'); h.innerText=currentEquip.emo; h.style.display='flex'; closeUI(); save(); }
    function closeUI() { document.querySelectorAll('.pop').forEach(p=>p.style.display='none'); }
    function upUI() { document.getElementById('r-w').innerText=inv.w; document.getElementById('r-s').innerText=inv.s; document.getElementById('r-i').innerText=inv.i; document.getElementById('hp').innerText=Math.floor(inv.hp); document.getElementById('hg').innerText=Math.floor(inv.hg); }
    function notify(t) { let m=document.getElementById('msg'); m.innerText=t; m.style.display='block'; setTimeout(()=>m.style.display='none', 2000); }
    var joy=document.getElementById('joy');
    joy.addEventListener('touchstart', (e)=>moveJ(e.touches[0]), {passive:false});
    joy.addEventListener('touchmove', (e)=>{ e.preventDefault(); moveJ(e.touches[0]); }, {passive:false});
    joy.addEventListener('touchend', ()=>{ mX=0; mY=0; document.getElementById('knob').style.transform='translate(-50%,-50%)'; });
    function moveJ(t) { if(mining) return; var r=joy.getBoundingClientRect(); var dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2); var d=Math.sqrt(dx*dx+dy*dy); if(d>50){ dx*=50/d; dy*=50/d; } document.getElementById('knob').style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`; mX=dx/14; mY=dy/14; }

    load(); switchMap('forest'); upUI(); requestAnimationFrame(gameLoop);
</script>
</body>
</html>
